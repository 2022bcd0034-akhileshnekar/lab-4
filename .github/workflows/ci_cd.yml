name: Lab 4 CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python scripts/train.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model.pkl
            metrics.json

  deploy:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - name: Compare metrics
        id: compare
        run: |
          CUR_MSE=$(jq '.mse' metrics.json)
          BEST_MSE=${{ vars.BEST_MSE }}

          echo "Current MSE: $CUR_MSE"
          echo "Best MSE: $BEST_MSE"

          if (( $(echo "$CUR_MSE < $BEST_MSE" | bc -l) )); then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "${{ github.actor }} ---- Metric did not improve"
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      # Login to DockerHub (official action)
      - name: Login to DockerHub
        if: steps.compare.outputs.deploy == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push image (official action)
      - name: Build and Push Docker Image
        if: steps.compare.outputs.deploy == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wine-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wine-api:latest

      - name: Update Best MSE
        if: steps.compare.outputs.deploy == 'true'
        run: |
          gh variable set BEST_MSE -b "$(jq '.mse' metrics.json)"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
